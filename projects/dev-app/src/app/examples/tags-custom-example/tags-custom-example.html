<p>
  By providing custom function to
  <b>[addTag]</b>
  you can modify result of new tag
</p>

<ng-select
  [items]="companies"
  bindLabel="name"
  [addTag]="addTagFn"
  [hideSelected]="true"
  [multiple]="true"
  [(ngModel)]="selectedCompanies"
/>

<br />
Selected value: {{ selectedCompanies | json }}
