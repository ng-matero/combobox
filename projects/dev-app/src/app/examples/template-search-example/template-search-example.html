<label for="">Custom search control inside of dropdown</label>

<ng-select
  #select
  [items]="cities"
  [searchable]="false"
  [(ngModel)]="selectedCity"
  bindLabel="name"
  bindValue="name"
>
  <ng-template ngSelectPanelHeader>
    <input class="w-100" type="text" (input)="select.filter($event.target.value)" />
  </ng-template>
</ng-select>
