<p>
  By default the dropdown position is set to auto and will be shown above if there is not space
  placing it at the bottom.
</p>

<ng-select [items]="cities" />

<hr />
<p>
  You can force position to top, right, bottom, or left by setting
  <b>panelPosition</b>
  .
</p>

<ng-select panelPosition="top" [searchable]="false" [items]="cities" />

<hr />
<ng-select panelPosition="right" [searchable]="false" [items]="cities" />

<hr />
<ng-select panelPosition="left" [searchable]="false" [items]="cities" />
