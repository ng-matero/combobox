<p>
  Custom template for each selected item using
  <b>ngSelectLabel</b>
</p>

<ng-select
  [items]="githubUsers$ | async"
  [multiple]="true"
  bindLabel="login"
  bindValue="login"
  [(ngModel)]="selectedUsers"
>
  <ng-template ngSelectLabel let-item="item" let-clear="clear">
    <span class="ng-select-value-label">
      <img [src]="item.avatar_url" width="20px" height="20px" alt="" />
      {{ item.login }}
    </span>
    <span class="ng-select-value-remove right" (click)="clear(item)" aria-hidden="true">×</span>
  </ng-template>

  <ng-template ngSelectOption let-item="item">
    <img [src]="item.avatar_url" width="20px" height="20px" alt="" />
    {{ item.login }}
  </ng-template>
</ng-select>
