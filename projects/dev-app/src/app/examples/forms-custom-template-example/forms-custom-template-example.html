<form [formGroup]="heroForm">
  <div class="form-group">
    <label for="photos">Custom templates</label>
    <ng-select
      placeholder="Select photo"
      formControlName="photo"
      [items]="photos()"
      bindLabel="title"
      bindValue="thumbnailUrl"
      inputId="photos"
      [virtualScroll]="true"
    >
      <ng-template ngSelectLabel let-item="item">
        <img height="16" width="16" [src]="item.thumbnailUrl" alt="" />
        <span>{{ item.title }}</span>
      </ng-template>
      <ng-template ngSelectOption let-item="item" let-index="index" let-search="searchTerm">
        <img height="16" width="16" [src]="item.thumbnailUrl" alt="" />
        <span [ngOptionHighlight]="search">{{ item.title }}</span>
      </ng-template>
    </ng-select>
    <small class="form-text text-muted">5000 items with virtual scroll</small>
    <br />
    <button class="btn btn-secondary btn-sm" (click)="selectFirstPhoto()">
      Select first photo
    </button>
    <button class="btn btn-secondary btn-sm" (click)="openModal(modalContent)">
      Open in modal
    </button>
    <button class="btn btn-secondary btn-sm" (click)="togglePhotoDisabled()">
      Toggle disabled
    </button>
  </div>

  <ng-template #modalContent let-modal>
    <div class="modal-header">
      <h4 class="modal-title">Select in modal</h4>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="album">Favorite photo</label>
        <ng-select
          #select
          placeholder="Select photo"
          formControlName="photo"
          [items]="photos()"
          bindLabel="title"
          bindValue="thumbnailUrl"
          appendTo="body"
          [virtualScroll]="true"
          (change)="changePhoto($event)"
          (keyup.esc)="$event.preventDefault()"
        >
          <ng-template ngSelectLabel let-item="item">
            <img height="16" width="16" [src]="item.thumbnailUrl" alt="" />
            <span>{{ item.title }}</span>
          </ng-template>
          <ng-template ngSelectOption let-item="item" let-index="index">
            <img height="16" width="16" [src]="item.thumbnailUrl" alt="" />
            <span>{{ item.title }}</span>
          </ng-template>
        </ng-select>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline-dark" (click)="modal.close('Close click')">
        Close
      </button>
    </div>
  </ng-template>
</form>
