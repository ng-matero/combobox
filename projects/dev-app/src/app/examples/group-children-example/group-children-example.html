<p>
  Group by children array. Note that when grouping by already grouped items ngSelectOptgroup is
  required to display correct headers.
</p>

<ng-select
  [items]="projects"
  bindLabel="title"
  bindValue="id"
  groupBy="subprojects"
  [multiple]="true"
  [(ngModel)]="selectedProjects"
>
  <ng-template ngSelectOptgroup let-item="item">
    {{ item.title }}
  </ng-template>
  <ng-template ngSelectOption let-item="item">
    {{ item.title }}
  </ng-template>
</ng-select>

<br />
<small>Selected: {{ selectedProjects | json }}</small>
