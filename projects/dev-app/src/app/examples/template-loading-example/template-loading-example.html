<p>
  Custom loading spinner using

</p>

<ng-select [loading]="true" [items]="cities" bindLabel="name" bindValue="name">

    <div class="lds-ellipsis">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </ng-template>
</ng-select>
