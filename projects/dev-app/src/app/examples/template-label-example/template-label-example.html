<p>
  Custom selected item label using
  <b>ngSelectLabel</b>
</p>

<ng-select [items]="cities" [(ngModel)]="selectedCity" bindLabel="name" bindValue="name">
  <ng-template ngSelectLabel let-item="item">
    <img height="16" width="16" [src]="item.avatar" alt="" />
    {{ item.name }}
  </ng-template>
</ng-select>
