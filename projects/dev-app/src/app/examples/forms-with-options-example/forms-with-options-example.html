<form [formGroup]="heroForm" novalidate>
  <div class="form-row">
    <div class="form-group col-md-6">
      <label for="yesno">Not searchable</label>
      <ng-select #agreeSelect inputId="yesno" [searchable]="false" formControlName="agree">
        <ng-option [value]="true">Yes</ng-option>
        <ng-option [value]="false">No</ng-option>
      </ng-select>
      <br />
      <button (click)="agreeSelect.focus()" class="btn btn-sm btn-secondary">Focus select</button>
    </div>
    <div class="form-group col-md-6">
      <label for="heroId">Basic select</label>
      <ng-select [searchable]="false" [clearable]="false" inputId="heroId" formControlName="heroId">
        <ng-option value="batman">
          <img src="batman.png" width="20" height="20" alt="" />
          Batman
        </ng-option>
        <ng-option value="spidey">
          <img src="spidey.png" width="20" height="20" alt="" />
          Spider-Man & Goblin
        </ng-option>
        <ng-option value="thor">
          <img src="thor.png" width="20" height="20" alt="" />
          Thor
        </ng-option>
      </ng-select>
    </div>
  </div>
</form>
