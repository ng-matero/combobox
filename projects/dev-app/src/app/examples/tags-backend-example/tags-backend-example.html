<p>
  <b>[addTag]</b>
  also accepts promise if you need to verify new option with backend
</p>

<ng-select
  [items]="companies"
  bindLabel="name"
  [addTag]="addTagPromise"
  [multiple]="true"
  [loading]="loading"
  [(ngModel)]="selectedCompanies"
>
  <ng-template ngSelectTag let-search="searchTerm">
    <b>create new:</b>
    <span>{{ search }}</span>
  </ng-template>
</ng-select>

<br />
Selected value: {{ selectedCompanies | json }}
