<p>
  In this example we are loading many items but only ~30 of them are rendered in the DOM. This
  allows to load as big data as you want.
</p>

<ng-select
  placeholder="Select photo"
  [items]="photosBuffer"
  bindLabel="title"
  bindValue="thumbnailUrl"
  [virtualScroll]="true"
  [loading]="loading"
  (scroll)="onScroll($event)"
  (scrollToEnd)="onScrollToEnd()"
>
  <ng-template ngSelectPanelHeader>
    <small class="form-text text-muted">
      Loaded {{ photosBuffer.length }} of {{ photos.length }}
    </small>
  </ng-template>
  <ng-template ngSelectOption let-item="item" let-index="index">
    <b>{{ index }}</b>
    {{ item.title }}
  </ng-template>
</ng-select>
